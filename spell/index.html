<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Casio Hacking Utils</title>
  <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
  <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
  <style>
    @font-face {
      font-family: 'CASIOClassWiz';
      src: url('../CASIOClassWiz.ttf') format('truetype');
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      overflow-x: hidden;
      background-color: #f9f9f9;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .casio {
      font-family: 'CASIOClassWiz', monospace;
      font-size: 18px;
      white-space: pre;
    }

    a {
      color: #007acc;
    }

    #header-title, #header-desc {
      text-align: center;
    }

    .menu-icon {
      width: 30px;
      cursor: pointer;
      position: fixed;
      top: 5px;
      left: 5px;
      z-index: 2;
      transition: left 0.4s;
      padding: 8px;
      border: 2px solid #000;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .bar {
      height: 3px;
      width: 100%;
      background: #000;
      margin: 3px 0;
      border-radius: 0 5px 5px 0;
    }

    .menu {
      position: fixed;
      top: 0;
      left: -33.33%;
      width: 33.33%;
      height: 100%;
      background: #eee;
      padding-top: 60px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.2);
      transition: left 0.4s;
      border-radius: 0 5px 5px 0;
    }
    .menu.open {
      left: 0;
    }
    .menu a {
      display: block;
      padding: 10px 30px;
      font-size: 22px;
      text-decoration: none;
      transition: background 0.3s;
    }
    .menu a:hover {
      background: #ddd;
    }
    .content {
      padding: 20px;
      margin: 0 15% 0 15%;
      justify-content: center;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <div class="menu-icon" id="icon" onclick="toggleMenu()">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <nav id="menu" class="menu">
    <a href="/">Home</a>
    <a href="#">Spell tool</a>
    <a href="#">test2</a>
    <a href="#">test3</a>
  </nav>

  <div class="content">
      <h1 id="header-title">Spell tool</h1>
      <p id="header-desc">Create a 17 character ASCII line of text! (fx 80 VN X only available)</p><br>
      <input type="text" id="input" maxlength="17" placeholder="Enter text here..." style="width: 50%; padding: 10px; font-size: 18px; border-radius: 5px; border: 1px solid #ccc;">
      <pre id="output" style="margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 5px; font-size: 18px; overflow: auto;">output goes here</pre>
    </div>

    <script type="mpy" src="spell.py"></script>
  <script>
    function toggleMenu() {
      const menu = document.getElementById("menu");
      const icon = document.getElementById("icon");
      const isOpen = menu.classList.toggle("open");
      icon.style.left = isOpen ? "33.33%" : "15px";
    }
  </script>

</body>
</html>
